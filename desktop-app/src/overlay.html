<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Soundboard Overlay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: -apple-system, "Segoe UI", sans-serif;
      user-select: none;
      overflow: hidden;
    }

    #panel {
      background: rgba(20, 20, 24, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      height: 100%;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      -webkit-app-region: drag;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f04747;
      display: inline-block;
      margin-right: 6px;
    }

    #status-dot.unlocked {
      background: #43b581;
    }

    #grid {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .sound-btn {
      background: rgba(88, 101, 242, 0.18);
      border: 1px solid rgba(88, 101, 242, 0.4);
      color: #fff;
      border-radius: 8px;
      padding: 10px 6px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      word-break: break-word;
      transition: background 0.1s ease, transform 0.05s ease;
    }

    .sound-btn:hover {
      background: rgba(88, 101, 242, 0.35);
    }

    .sound-btn:active {
      transform: scale(0.96);
    }

    .sound-btn.playing {
      background: rgba(67, 181, 129, 0.4);
      border-color: #43b581;
    }

    .sound-btn.error {
      background: rgba(240, 71, 71, 0.4);
      border-color: #f04747;
    }

    .hotkey {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      opacity: 0.6;
    }

    #empty {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      padding: 16px;
      text-align: center;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
  <div id="panel">
    <div id="header">
      <span><span id="status-dot"></span>Soundboard</span>
      <span id="lock-label">locked</span>
    </div>
    <div id="grid"></div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
